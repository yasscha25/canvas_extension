<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Canvas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #0f0f11;
      color: #e8e8f0;
      font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
    }

    .popup-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid #2e2e38;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .popup-icon {
      font-size: 20px;
      line-height: 1;
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      color: #818cf8;
      letter-spacing: 0.03em;
    }

    .popup-subtitle {
      font-size: 11px;
      color: #7b7b8f;
      margin-top: 2px;
    }

    .popup-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1f;
      border: 1px solid #2e2e38;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
      color: #e8e8f0;
    }

    .toggle-desc {
      font-size: 11px;
      color: #7b7b8f;
      margin-top: 2px;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #2e2e38;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #7b7b8f;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .slider {
      background: #6366f1;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
      background: #fff;
    }

    /* Status */
    .status-badge {
      text-align: center;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      background: #1a1a1f;
      border: 1px solid #2e2e38;
      color: #7b7b8f;
      transition: background 0.2s, color 0.2s;
    }

    .status-badge.active {
      background: rgba(99,102,241,0.15);
      border-color: #6366f1;
      color: #818cf8;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .action-btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid #2e2e38;
      background: #1a1a1f;
      color: #e8e8f0;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn:hover {
      background: #222228;
      border-color: #6366f1;
    }

    .action-btn .btn-icon {
      font-size: 14px;
      opacity: 0.8;
    }

    /* Shortcuts */
    .shortcuts {
      background: #1a1a1f;
      border: 1px solid #2e2e38;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .shortcuts-title {
      font-size: 11px;
      font-weight: 600;
      color: #7b7b8f;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 11px;
      color: #7b7b8f;
    }

    kbd {
      background: #222228;
      border: 1px solid #3e3e4a;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: monospace;
      color: #e8e8f0;
    }

    .popup-footer {
      padding: 10px 16px;
      border-top: 1px solid #2e2e38;
      font-size: 10px;
      color: #4a4a5a;
      text-align: center;
    }

    #open-tab-btn {
      background: rgba(99,102,241,0.12);
      border-color: #6366f1;
      color: #818cf8;
    }
    #open-tab-btn:hover {
      background: rgba(99,102,241,0.22);
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="popup-icon">⬡</span>
    <div>
      <div class="popup-title">ChatGPT Canvas</div>
      <div class="popup-subtitle">Dashboard visual para tus conversaciones</div>
    </div>
  </div>

  <div class="popup-body">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Canvas activo</div>
        <div class="toggle-desc">Reemplaza la vista central</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggle-canvas">
        <span class="slider"></span>
      </label>
    </div>

    <div class="status-badge" id="status-badge">⏸ Canvas desactivado</div>

    <div class="actions">
      <button class="action-btn" id="open-tab-btn">
        <span class="btn-icon">🔗</span> Abrir ChatGPT en esta pestaña
      </button>
      <button class="action-btn" id="export-btn">
        <span class="btn-icon">💾</span> Exportar canvas actual (JSON)
      </button>
      <button class="action-btn" id="clear-btn">
        <span class="btn-icon">🗑</span> Limpiar datos de este chat
      </button>
    </div>

    <div class="shortcuts">
      <div class="shortcuts-title">Herramientas del canvas</div>
      <div class="shortcut-row"><span>Seleccionar / mover</span><kbd>↖</kbd></div>
      <div class="shortcut-row"><span>Resaltador</span><kbd>🖊</kbd></div>
      <div class="shortcut-row"><span>Subrayado</span><kbd>U̲</kbd></div>
      <div class="shortcut-row"><span>Nota de texto</span><kbd>T</kbd></div>
      <div class="shortcut-row"><span>Dibujo libre</span><kbd>✏</kbd></div>
      <div class="shortcut-row"><span>Pan (arrastrar fondo)</span><kbd>drag</kbd></div>
      <div class="shortcut-row"><span>Bifurcar desde bloque</span><kbd>+</kbd></div>
    </div>
  </div>

  <div class="popup-footer">
    ChatGPT Canvas · uso personal
  </div>

  <script src="popup.js"></script>
</body>
</html>
